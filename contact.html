<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>احجز الآن | Loving Homes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<aside class="sidebar">
    <div class="logo-section">
        <img src="images/8.png" alt="شعار الفندق">
        <h3>لوفينغ هومز</h3>
    </div>
    
    <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="about.html">من نحن</a></li>
        <li><a href="services.html">خدماتنا والمرافق</a></li>
        <li><a href="packages.html">الحزم والأسعار</a></li>
        <li><a href="gallery.html">معرض الصور</a></li>
        <li><a href="contact.html">احجز الآن</a></li>
        <li><a href="faq.html">الأسئلة الشائعة</a></li>
        <li><a href="accessibility.html">تيسير الوصول</a></li>
    </ul>
</aside> <br> 

<main class="main-content">
    <div class="content-card" style="max-width: 800px; margin: 0 auto;">
        <h1 style="text-align: center; border-bottom: 2px solid var(--accent-color); padding-bottom: 15px;">أحجز من هنا</h1>
        <p style="text-align: center; margin-top: 15px; color: #666;">
            يسعدنا استضافة أليفك  عبّي البيانات أدناه وسيتواصل معك فريقنا خلال 24 ساعة لتأكيد الحجز
        </p>
        
        <form id="contactForm" class="booking-form" style="margin-top: 30px;">
            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label>اسم صاحب الأليف:</label>
                    <input type="text" id="userName" placeholder="اسمك الكامل" required>
                </div>
                <div style="flex: 1;">
                    <label>اسم الأليف:</label>
                    <input type="text" id="petName" placeholder="مثلاً: ريكس" required>
                </div>
            </div>

            <div>
                <label>بريدك الإلكتروني:</label>
                <input type="email" id="userEmail" placeholder="example@mail.com" required>
            </div>

            <div>
                <label>نوع الحزمة المطلوبة:</label>
                <select id="packageType">
                    <option value="premium">الحزمة المميزة (بث مباشر + تدريب)</option>
                    <option value="classic">الحزمة الكلاسيكية (إقامة + وجبات)</option>
                    <option value="basic">الحزمة الاقتصادية (إقامة فقط)</option>
                </select>
            </div>

            <div>
                <label>ملاحظات خاصة (اختياري):</label>
                <textarea id="message" rows="4" placeholder="هل يحتاج أليفك لعناية خاصة أو طعام محدد؟" style="width:80%; padding:10px; border-radius:10px; border:2px solid #edf2f7;"></textarea>
            </div>

            <button type="submit" class="btn-main btn-large">تأكيد إرسال الطلب</button>
        </form>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
